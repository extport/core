name: Sync Template GitHub Config

on:
  repository_dispatch:
    types: [template-github-changed]
  workflow_dispatch:

jobs:
  sync:
    name: Sync .github/ to mirror repos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Sync template .github/ to all mirrors
        run: node scripts/sync-template-github.js
        env:
          GITHUB_TOKEN: ${{ secrets.EXTPORT_BOT_TOKEN }}
