name: Health Check

on:
  schedule:
    - cron: '0 8 * * 1'   # every Monday at 08:00 UTC
  workflow_dispatch:

jobs:
  health-check:
    name: Check all mirror repo health
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run health check
        id: health
        run: node scripts/health-check.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Open issue if problems found
        if: steps.health.outputs.has-problems == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const report = process.env.HEALTH_REPORT;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Health check: problems found ${new Date().toISOString().split('T')[0]}`,
              body: report,
              labels: ['health-check', 'automated']
            });
        env:
          HEALTH_REPORT: ${{ steps.health.outputs.report }}